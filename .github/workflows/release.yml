name: "publish"

on:
  push:
    branches:
      - main
    paths-ignore:
      - update.json

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Linux
            args: ""
          - platform: "windows-latest" # for Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos-latest
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: install WiX v4 (windows only)
        if: matrix.platform == 'windows-latest'
        run: dotnet tool install --global wix

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare App Store Connect API key (macOS only)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -z "${{ secrets.APPLE_API_PRIVATE_KEY }}" ] || [ -z "${{ secrets.APPLE_API_KEY }}" ]; then
            echo "App Store Connect API key not configured, skipping key file preparation"
            exit 0
          fi

          mkdir -p private_keys
          printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > "private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          echo "APPLE_API_KEY_PATH=$PWD/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" >> $GITHUB_ENV

      - name: Export Apple signing environment (macOS only)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "APPLE_CERTIFICATE<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_PASSWORD }}" ]; then
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_API_KEY }}" ]; then
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV
          fi

      - name: Verify Signing Key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY is not set! Auto-updates will NOT work without signed builds."
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is configured"
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Verify macOS signing configuration
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ]; then
            echo "✅ Apple signing certificate configured"
          else
            echo "::warning::APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD not set. macOS builds will fall back to ad-hoc signing."
          fi

          if [ -n "${{ env.APPLE_API_KEY_PATH }}" ] && [ -n "${{ secrets.APPLE_API_KEY }}" ] && [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "✅ App Store Connect notarization configured"
          elif [ -n "${{ secrets.APPLE_ID }}" ] && [ -n "${{ secrets.APPLE_PASSWORD }}" ] && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "✅ Apple ID notarization configured"
          else
            echo "::warning::No macOS notarization credentials configured. Browser-downloaded builds may still trigger Gatekeeper warnings."
          fi

      - name: Extract Release Notes
        id: extract_notes
        shell: bash
        run: |
          {
            echo "notes<<EOF"
            node .github/scripts/extract-release-notes.js
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri signing keys - REQUIRED for auto-updates to work
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          includeUpdaterJson: true
          tagName: app-v__VERSION__
          releaseName: "Brows3 v__VERSION__"
          releaseBody: ${{ steps.extract_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    if: github.actor != 'github-actions[bot]'
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="app-v$VERSION"
          
          echo "Updating manifest for version $VERSION ($TAG)"
          
          # Wait for GitHub to process the assets and release metadata
          RELEASE_INFO=""
          for attempt in 1 2 3 4 5 6 7 8; do
            if RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/$TAG 2>/dev/null); then
              ASSET_COUNT=$(echo "$RELEASE_INFO" | jq '.assets | length')
              if [ "$ASSET_COUNT" -gt 0 ]; then
                echo "Release metadata ready on attempt $attempt with $ASSET_COUNT asset(s)"
                break
              fi
            fi

            if [ "$attempt" -eq 8 ]; then
              echo "::error::Release assets were not ready in time for $TAG"
              exit 1
            fi

            echo "Release assets not ready yet for $TAG, retrying in 15 seconds (attempt $attempt/8)"
            sleep 15
          done
          
          # Debug: List all assets found
          echo "=== Found Release Assets ==="
          echo "$RELEASE_INFO" | jq -r '.assets[] | .name' | sort
          echo "==========================="
          
          # Check if we have signature files
          SIG_COUNT=$(echo "$RELEASE_INFO" | jq '[.assets[] | select(.name | endswith(".sig"))] | length')
          echo "Found $SIG_COUNT signature files"
          
          if [ "$SIG_COUNT" -eq "0" ]; then
            echo "::warning::No signature files found! The TAURI_SIGNING_PRIVATE_KEY may not be configured correctly."
            echo "Auto-updates will NOT work without signed builds."
            echo "Please add TAURI_SIGNING_PRIVATE_KEY to your GitHub repository secrets."
            echo ""
            echo "To generate a signing key, run:"
            echo "  npx @tauri-apps/cli signer generate -w ~/.tauri/brows3.key"
            echo ""
            echo "Then add the private key contents to TAURI_SIGNING_PRIVATE_KEY secret,"
            echo "and update the pubkey in tauri.conf.json plugins.updater.pubkey"
          fi
          
          # Start building the platforms object
          PLATFORMS="{}"
          
          # Function to add platform
          add_platform() {
            local PLATFORM=$1
            local PATTERN=$2
            local SIG_PATTERN=$3
            
            # Find the asset URL
            ASSET_URL=$(echo "$RELEASE_INFO" | jq -r ".assets[] | select(.name | test(\"$PATTERN\"; \"i\")) | .browser_download_url" | head -1)
            
            if [ -n "$ASSET_URL" ] && [ "$ASSET_URL" != "null" ]; then
              echo "Found $PLATFORM asset: $(basename "$ASSET_URL")"
              
              # Download the signature
              SIG_URL=$(echo "$RELEASE_INFO" | jq -r ".assets[] | select(.name | test(\"$SIG_PATTERN\"; \"i\")) | .browser_download_url" | head -1)
              
              if [ -n "$SIG_URL" ] && [ "$SIG_URL" != "null" ]; then
                SIG=$(curl -sL "$SIG_URL")
                # Escape quotes in signature just in case
                SIG=$(echo "$SIG" | jq -R '.')
                # Remove enclosing quotes from jq output as we construct JSON manually/jq
                SIG="${SIG%\"}"
                SIG="${SIG#\"}"
                
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg p "$PLATFORM" --arg u "$ASSET_URL" --arg s "$SIG" '.[$p] = {"url": $u, "signature": $s}')
                echo "✅ Added $PLATFORM with signature"
              else
                 echo "⚠️ Found asset for $PLATFORM but missing signature file"
              fi
            else
               echo "❌ Could not find asset for $PLATFORM (pattern: $PATTERN)"
            fi
          }
          
          # Add each platform - Updated patterns to match Tauri v2 naming
          # macOS Apple Silicon (aarch64) - matches Brows3_aarch64.app.tar.gz
          add_platform "darwin-aarch64" "_aarch64\\.app\\.tar\\.gz$" "_aarch64\\.app\\.tar\\.gz\\.sig$"
          
          # macOS Intel (x64) - matches Brows3_x64.app.tar.gz  
          add_platform "darwin-x86_64" "_x64\\.app\\.tar\\.gz$" "_x64\\.app\\.tar\\.gz\\.sig$"
          
          # Linux (AppImage) - matches Brows3_<version>_amd64.AppImage
          add_platform "linux-x86_64" "_amd64\\.AppImage$" "_amd64\\.AppImage\\.sig$"
          
          # Windows (NSIS) - matches Brows3_<version>_x64-setup.exe
          add_platform "windows-x86_64" "_x64-setup\\.exe$" "_x64-setup\\.exe\\.sig$"
          
          # Check if we have any platforms
          PLATFORM_COUNT=$(echo "$PLATFORMS" | jq 'keys | length')
          
          if [ "$PLATFORM_COUNT" -eq "0" ]; then
            echo "::error::No platforms could be added to update.json! Auto-updates will not work."
            echo "This usually means TAURI_SIGNING_PRIVATE_KEY is not set in GitHub secrets."
            exit 1
          else
            echo "Successfully added $PLATFORM_COUNT platforms to update manifest"
          fi
          
          # Build final update.json
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$TAG for release notes.",
            "pub_date": "$PUB_DATE",
            "platforms": $PLATFORMS
          }
          EOF
          
          # Pretty print
          cat update.json | jq . > update.json.tmp && mv update.json.tmp update.json
          
          echo ""
          echo "=== Final update.json ==="
          cat update.json
          echo "========================="
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || (git commit -m "chore: update auto-update manifest to v$VERSION" && git push origin main)
